services:
  db:
    image: postgres:17.4-alpine
    container_name: helpdesk_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-volume:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - helpdesk-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helpdesk_backend
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: helpdesk_app
      SPRING_DATASOURCE_PASSWORD: helpdesk_app_password
      SPRING_LIQUIBASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_LIQUIBASE_USER: helpdesk_migrator
      SPRING_LIQUIBASE_PASSWORD: helpdesk_migrator_password
    ports:
      - "8090:8090"
    networks:
      - helpdesk-network

volumes:
  postgres-volume:

networks:
  helpdesk-network: